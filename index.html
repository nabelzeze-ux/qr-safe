<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
        }
        img {
            max-width: 80%;
            border: 5px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { margin-bottom: 20px; }
        .btn {
            margin-top: 30px;
            background-color: #31a6d3;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>إمسح الرمز للدفع</h2>
    <img src="qr.png" alt="QR Code">
    
    <a href="javascript:void(0)" class="btn" onclick="window.Telegram.WebApp.close();">تم التحويل - إغلاق</a>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // لجعل الصفحة تفتح بكامل الشاشة
    </script>
</body>
</html>
